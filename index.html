<html>

    <script

      src="https://www.gstatic.com/charts/loader.js"

    <script type="text/javascript">
      google.charts.load("current", { packages: ["timeline"] });
      google.charts.setOnLoadCallback(workingChart);
      google.charts.setOnLoadCallback(volunteerChart);
      google.charts.setOnLoadCallback(studentChart);
      google.charts.setOnLoadCallback(lifeChart);

      function drawChart(data, element_id) {
        var container = document.getElementById(element_id);
        var chart = new google.visualization.Timeline(container);
        var dataTable = new google.visualization.DataTable();
        dataTable.addColumn({ type: "string", id: "Term" });
        dataTable.addColumn({ type: "string", id: "Name" });
        dataTable.addColumn({ type: "date", id: "Start" });
        dataTable.addColumn({ type: "date", id: "End" });
        dataTable.addRows(data);
        chart.draw(dataTable);
      }

      function workingChart() {
        var data = [
          [
            "Microsoft",
            "Software Engineer Intern",
            new Date(2019, 3, 1),
            new Date()
          ],
          ["Fullbrain", "Co-Founder", new Date(2019, 5, 1), new Date()],
          [
            "Technical University of Denmark",
            "TA in Machine Learning",
            new Date(2020, 1, 1),
            new Date(2020, 5, 1)
          ],
          [
            "Technical University of Denmark",
            "TA in Database Systems",
            new Date(2020, 1, 1),
            new Date(2020, 5, 1)
          ]
        ];
        drawChart(data, "working");
      }
